apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"TraceId"\s*:\s*"([a-f0-9]{32})"'
          name: TraceID
          url: "$${__value.raw}"
        - datasourceUid: tempo
          matcherRegex: 'traceId=([a-f0-9]{32})'
          name: TraceID
          url: "$${__value.raw}"
