server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Docker container logs ──────────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # ใช้ชื่อ container เป็น label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # ดึง compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # ดึง compose project name
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      # เพิ่ม image label
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # กรองเฉพาะ container ที่ running
      - source_labels: [__meta_docker_container_state]
        regex: running
        action: keep

    pipeline_stages:
      # พยายาม parse JSON log (สำหรับ .NET structured logging)
      - json:
          expressions:
            log_level: level
            trace_id: TraceId
            correlation_id: CorrelationId
            message: Message
            timestamp: Timestamp
      # เพิ่ม label จาก JSON fields
      - labels:
          log_level:
          trace_id:
          correlation_id:
      # ถ้า parse ไม่ได้ ใช้ plain text
      - match:
          selector: '{job="docker-containers"}'
          stages:
            - regex:
                expression: '(?P<log_level>TRACE|DEBUG|INFO|WARN|ERROR|FATAL|trce|dbug|info|warn|fail|crit)'
            - labels:
                log_level:

  # ── Host system logs ──────────────────────────────────────
  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          __path__: /var/log/*.log
